# --- Application Information ---
spring.application.name=portfolio-backend

# --- Database Configuration (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolio
spring.datasource.username=portfolio_user
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Hibernate / JPA Configuration ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# --- Security / JWT Configuration ---
jwt.secret=${JWT_SECRET}
# 24 hours in milliseconds
jwt.expiration=86400000  

# --- Other Configurations (optional) ---
#spring.mail.host=
#spring.mail.port=
#spring.mail.username=
#spring.mail.password=
# Any other dev-specific config can be added here

cors.allowed-origin=http://localhost:5173

# --- SMS Notification (Twilio) ---
notification.sms.enabled=true
notification.sms.account-sid=${TWILIO_ACCOUNT_SID}
notification.sms.auth-token=${TWILIO_AUTH_TOKEN}
notification.sms.from-number=${TWILIO_FROM_NUMBER}
notification.sms.to-number=${SMS_TO_NUMBER}
notification.sms.messaging-service-sid=${TWILIO_MESSAGING_SERVICE_SID}

# CV file path (absolute or relative to project root)
cv.file-path=

# reCAPTCHA
recaptcha.secret=${GOOGLE_RECAPTCHA_SECRET:}

# Telegram notifications
telegram.notifications-enabled=${TELEGRAM_NOTIFICATIONS_ENABLED:false}
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

# Discord notifications
discord.notifications-enabled=${DISCORD_NOTIFICATIONS_ENABLED:false}
discord.webhook-url=${DISCORD_WEBHOOK_URL:}

# Email notifications
email.notifications-enabled=${EMAIL_NOTIFICATIONS_ENABLED:false}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
mail.from=${MAIL_FROM:}
mail.to=${MAIL_TO:}
